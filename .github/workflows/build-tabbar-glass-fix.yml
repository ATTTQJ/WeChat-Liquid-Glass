name: Build TabBar Glass Fix

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --depth=1 --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Install iPhoneOS SDK
        run: |
          mkdir -p "$HOME/theos/sdks"
          curl -L \
            "https://github.com/theos/sdks/archive/refs/heads/master.tar.gz" \
            -o /tmp/theos-sdks.tar.gz
          tar -xzf /tmp/theos-sdks.tar.gz -C /tmp
          find /tmp/sdks-master -maxdepth 1 -name "iPhoneOS*.sdk" -exec cp -R {} "$HOME/theos/sdks/" \;

      - name: Build package
        working-directory: TabBarGlassFix
        run: |
          make clean package FINALPACKAGE=1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: WCLGTabBarGlassFix-package
          path: TabBarGlassFix/packages/*
          if-no-files-found: error
